<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Eco Runner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body{
      margin:0;
      font-family:"Poppins",sans-serif;
      background:linear-gradient(to bottom,#6be47a,#1e7a2e);
      color:#fff;
      overflow:hidden;
    }
    h1{text-align:center;margin:14px 0;font-size:28px;text-shadow:0 0 10px rgba(0,0,0,.25)}
    #score{text-align:center;margin-bottom:6px;font-size:18px;text-shadow:0 0 8px rgba(0,0,0,.25)}
    #game{
      width:100%;
      height:420px;
      background:rgba(255,255,255,0.12);
      border-top:4px solid rgba(255,255,255,0.08);
      position:relative;
      overflow:hidden;
    }
    #player{
      width:60px;
      position:absolute;
      bottom:20px;
      left:50px;
      transition:transform 0.12s;
    }
    .obstacle,.coin{
      position:absolute;
      right:-80px;
      bottom:20px;
    }
    .coin{bottom:120px}
    #restart{
      display:none;
      margin:14px auto;
      padding:10px 16px;
      border-radius:8px;
      border:none;
      background:#ffe600;
      color:#064017;
      font-weight:700;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <h1>Eco Runner</h1>
  <div id="score">Score: 0  •  High: <span id="high">0</span></div>
  <div id="game">
    
    <!-- 🌿 Player (SVG Instead of Image) -->
    <svg id="player" viewBox="0 0 100 100">
      <circle cx="50" cy="40" r="22" fill="#42c76f" />
      <rect x="30" y="60" width="40" height="25" rx="6" fill="#2a6d3a"/>
      <ellipse cx="50" cy="75" rx="20" ry="8" fill="#184d2b"/>
    </svg>

  </div>

  <button id="restart" onclick="restartGame()">🔄 Restart</button>
  <button style="position:fixed;left:10px;top:10px;padding:8px 12px;border-radius:8px;border:none;background:rgba(0,0,0,0.25);color:#fff;cursor:pointer" onclick="location.href='games.html'">← Back</button>

<script>
let score=0, high=Number(localStorage.getItem('runner_high')||0), isGameOver=false;
const player=document.getElementById('player'),
      game=document.getElementById('game'),
      scoreEl=document.getElementById('score'),
      restartBtn=document.getElementById('restart');

document.getElementById('high').innerText=high;

document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.key===' ') jump();
});

function jump(){
  if(isGameOver) return;
  player.style.transform='translateY(-120px)';
  setTimeout(()=> player.style.transform='translateY(0px)',450);
}

/* 🌱 New SVG obstacle */
function spawnObstacle(){
  if(isGameOver) return;
  const obs = document.createElement('div');
  obs.className='obstacle';
  obs.innerHTML = `
    <svg width="55" height="55" viewBox="0 0 80 80">
      <rect x="10" y="20" width="60" height="40" rx="8" fill="#444"/>
      <circle cx="30" cy="40" r="6" fill="#888"/>
      <circle cx="50" cy="40" r="6" fill="#888"/>
    </svg>
  `;
  game.appendChild(obs);

  let pos = -80, speed = 6 + Math.random()*4;
  const loop = setInterval(()=>{
    pos += speed;
    obs.style.right = pos + 'px';

    if(isColliding(player, obs)){
      gameOver();
      clearInterval(loop);
      obs.remove();
    }

    if(pos > game.offsetWidth + 120){
      clearInterval(loop);
      obs.remove();
    }
  },20);
}

/* 💚 New SVG coin */
function spawnCoin(){
  if(isGameOver) return;
  const coin = document.createElement('div');
  coin.className='coin';
  coin.innerHTML = `
    <svg width="40" height="40" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" fill="#38c172" stroke="#e9ffe9" stroke-width="4"/>
      <path d="M22 34 C32 24, 42 24, 50 20" stroke="#fff" stroke-width="3" fill="none"/>
    </svg>
  `;
  game.appendChild(coin);

  let pos = -60, speed = 5 + Math.random()*3;
  const loop = setInterval(()=>{
    pos += speed;
    coin.style.right = pos + 'px';

    if(isColliding(player, coin)){
      score += 5;
      updateScore();
      clearInterval(loop);
      coin.remove();
    }

    if(pos > game.offsetWidth + 100){
      clearInterval(loop);
      coin.remove();
    }
  },20);
}

function isColliding(a,b){
  const aRect=a.getBoundingClientRect(), bRect=b.getBoundingClientRect();
  return !(aRect.top > bRect.bottom || aRect.bottom < bRect.top || aRect.left > bRect.right || aRect.right < bRect.left);
}

function updateScore(){
  scoreEl.innerText=`Score: ${score}  •  High: ${localStorage.getItem('runner_high')||0}`;
}

function gameOver(){
  isGameOver=true;
  restartBtn.style.display='block';
  alert('Game Over! Score: '+score);

  if(score>high){
    localStorage.setItem('runner_high',score);
    document.getElementById('high').innerText=score;
    alert('New high score! 🎉');
  }
}

function restartGame(){
  isGameOver=false; score=0; updateScore();
  restartBtn.style.display='none';
  document.querySelectorAll('.obstacle,.coin').forEach(n=>n.remove());
}

setInterval(spawnObstacle,1500);
setInterval(spawnCoin,2300);
</script>
</body>
</html>
