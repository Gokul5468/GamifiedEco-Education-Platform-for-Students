<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ocean Cleanup</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body{margin:0;font-family:"Poppins",sans-serif;background:linear-gradient(to bottom,#00b4d8,#03045e);color:#fff;overflow:hidden;text-align:center;}
    h1{margin:14px 0;}
    #score{font-size:18px;}
    #game{width:100%;height:420px;background:rgba(255,255,255,0.1);position:relative;overflow:hidden;border-top:4px solid rgba(255,255,255,0.2);}
    .trash{position:absolute;font-size:30px;cursor:pointer;user-select:none;}
    #boat{position:absolute;bottom:10px;font-size:50px;left:50%;transform:translateX(-50%);transition:left 0.1s;}
    .btn{margin-top:10px;padding:10px 16px;border-radius:8px;border:none;background:#ffe600;color:#064017;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
  <h1>🌊 Ocean Cleanup</h1>
  <div id="score">Plastic Collected: 0  •  High: <span id="high">0</span></div>
  <div id="game">
    <div id="boat">🛥️</div>
  </div>
  <div>
    <button class="btn" style="background:#f43f5e;color:#fff;" onclick="gameOver()">End Game</button>
    <button class="btn" onclick="location.href='games.html'">Back</button>
  </div>
<script>
let score=0, isGameOver=false;
const game=document.getElementById('game'), highEl=document.getElementById('high');
function loadHigh(){ highEl.innerText = localStorage.getItem('ocean_high')||0; }
loadHigh();

const trashItems = ['🥤', '🛍️', '🧴', '🥫'];
setInterval(()=>{
  if(isGameOver) return;
  const trash = document.createElement('div');
  trash.className='trash';
  trash.innerText = trashItems[Math.floor(Math.random()*trashItems.length)];
  trash.style.left = Math.random()*90 + '%';
  trash.style.top = '-40px';
  game.appendChild(trash);

  trash.onclick = () => {
    if(isGameOver) return;
    score++;
    document.getElementById('score').innerText = `Plastic Collected: ${score}  •  High: ${localStorage.getItem('ocean_high')||0}`;
    trash.remove();
  };

  let pos = -40;
  const fall = setInterval(()=>{
    pos += 2;
    trash.style.top = pos+'px';
    if(pos > 400){
      clearInterval(fall);
      if(game.contains(trash)){
        gameOver();
        trash.remove();
      }
    }
  }, 20);
}, 1000);

function gameOver(){
  if(isGameOver) return;
  isGameOver=true;
  alert('Game Over! Trash hit the ocean floor. Score: '+score);
  const prev = Number(localStorage.getItem('ocean_high')||0);
  if(score>prev){ localStorage.setItem('ocean_high',score); loadHigh(); }

  const email = localStorage.getItem("userEmail");
  if (email && score > 0) {
    fetch("http://localhost:4000/api/users/addPoints", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, points_to_add: score })
    }).catch(e=>console.log(e));
  }
}
</script>
</body>
</html>
