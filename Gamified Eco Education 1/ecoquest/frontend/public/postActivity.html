<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
  <meta charset="utf-8" />
  <title>Green Stories | EcoQuest</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    .feed-container {
      max-width: 600px;
      margin: 40px auto;
    }

    .post-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 25px;
      margin-bottom: 30px;
      animation: slideUp 0.6s ease-out backwards;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .p-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .p-meta h4 {
      margin: 0;
      font-size: 1.1rem;
    }

    .p-meta span {
      opacity: 0.5;
      font-size: 0.85rem;
    }

    .post-img {
      width: 100%;
      border-radius: 20px;
      margin: 15px 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .post-text {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.8;
    }

    .interact {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 15px;
    }

    .int-btn {
      cursor: pointer;
      opacity: 0.6;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .int-btn:hover {
      opacity: 1;
      color: var(--accent);
    }

    .create-post {
      background: var(--glass);
      padding: 30px;
      border-radius: 30px;
      border: 1px solid var(--accent);
      margin-bottom: 50px;
    }
  </style>
</head>

<body>
  <div class="vines"></div>
  <div class="forest-bg" id="forest"></div>

  <a href="student.html" class="back-nav"
    style="position:fixed; top:40px; left:40px; text-decoration:none; color:#fff; font-weight:700; z-index:1000;">←
    Dashboard</a>

  <div class="dashboard-wrapper">
    <div style="text-align:center; margin-bottom: 50px;">
      <h1 style="font-size: 4rem; font-weight: 900; letter-spacing: -3px;">GREEN <span>STORIES</span></h1>
      <p style="opacity: 0.6; font-size: 1.2rem;">Proof that change is possible. Observe and inspire the global
        community.</p>
    </div>

    <div class="feed-container">
      <div class="create-post">
        <textarea id="pTx"
          style="width:100%; height:100px; background:transparent; border:none; color:#fff; font-size:1.2rem; outline:none;"
          placeholder="What's your green act today?"></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
          <div style="cursor:pointer; opacity:0.6;">📷 Add Image</div>
          <button class="btn-premium" style="width:auto; padding:10px 30px;" onclick="post()">Share Story</button>
        </div>
      </div>

      <div id="feed">
        <p style="text-align:center; opacity:0.6;">Loading stories from database...</p>
      </div>
    </div>
  </div>

  <script>
    async function loadStories() {
      const feed = document.getElementById('feed');
      try {
        const res = await fetch("/api/stories");
        const j = await res.json();
        if (j.success && j.stories && j.stories.length > 0) {
          feed.innerHTML = '';
          j.stories.forEach(story => {
            const author = story.profiles ? story.profiles.full_name : "Unknown Ranger";
            const initials = author.split(' ').map(x => x[0]).slice(0, 2).join('').toUpperCase() || '??';
            const timeStr = new Date(story.created_at).toLocaleString();
            
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
              <div class="post-header">
                <div class="p-avatar">${initials}</div>
                <div class="p-meta">
                  <h4>${author}</h4>
                  <span>${timeStr}</span>
                </div>
              </div>
              <p class="post-text">${story.content}</p>
              <div class="interact">
                <div class="int-btn" id="resp-${story.id}" onclick="addRespect('${story.id}')">🌿 Respect (${story.respects || 0})</div>

              </div>
            `;
            feed.appendChild(card);
          });
        } else {
          feed.innerHTML = '<p style="text-align:center; opacity:0.6;">No stories found yet. Be the first!</p>';
        }
      } catch(err) {
        feed.innerHTML = '<p style="text-align:center; color:#ff5252;">Failed to connect to database. Ensure the backend is running and the stories table exists.</p>';
      }
    }

    async function addRespect(id) {
      const btn = document.getElementById(`resp-${id}`);
      try {
        const res = await fetch("/api/stories/respect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ story_id: id })
        });
        const j = await res.json();
        if (j.success) {
          btn.style.color = '#affc41';
          btn.innerText = `🌿 Respect (${j.respects})`;
        }
      } catch (err) {
        console.error("Could not add respect");
      }
    }

    async function post() {
      const val = document.getElementById('pTx').value.trim();
      const email = localStorage.getItem("userEmail");
      
      if (!val) return;
      if (!email) {
        alert("You must be logged in to post a story.");
        return;
      }
      
      try {
        const res = await fetch("/api/stories", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, content: val })
        });
        
        const j = await res.json();
        if (j.success) {
          document.getElementById('pTx').value = "";
          alert("Story Published!");
          loadStories(); // Reload feed with new post
        } else {
          alert("Error saving story: " + j.error);
        }
      } catch (err) {
        alert("Network error. Could not save story.");
      }
    }

    // Load stories when page opens
    window.addEventListener('load', loadStories);

    // Background script
    const forest = document.getElementById('forest');
    const treeCount = Math.floor(window.innerWidth / 80);
    for (let i = 0; i < treeCount; i++) {
      const tree = document.createElement('div');
      tree.style.position = 'absolute';
      tree.style.bottom = '0';
      tree.style.left = (Math.random() * 100) + '%';
      tree.style.opacity = '0.05';
      tree.style.transform = `scale(${0.5 + Math.random()})`;
      tree.innerHTML = `<svg width="80" height="120"><path d="M40 10 L10 100 L70 100 Z" fill="#fff" /></svg>`;
      forest.appendChild(tree);
    }
  </script>
</body>

</html>
