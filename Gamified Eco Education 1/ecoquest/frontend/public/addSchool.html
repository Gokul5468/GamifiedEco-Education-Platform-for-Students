<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
  <meta charset="UTF-8">
  <title>Register School | EcoQuest Admin</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      display: flex;
    }

    .admin-glass {
      max-width: 650px;
      padding: 50px;
    }

    .divider {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 35px 0;
    }

    .code-group {
      display: flex;
      gap: 15px;
      align-items: flex-end;
    }

    .back-nav {
      position: absolute;
      top: 40px;
      left: 40px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.6;
      transition: 0.3s;
      z-index: 100;
    }

    .back-nav:hover {
      opacity: 1;
      transform: translateX(-5px);
    }

    @media (max-width: 500px) {
      .code-group {
        flex-direction: column;
        align-items: stretch;
      }
      .code-group button {
        margin-top: 10px;
        width: 100%;
      }
      .back-nav {
        top: 20px;
        left: 20px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="vines"></div>
  <div class="forest-bg" id="forest"></div>

  <a href="admin.html" class="back-nav">← Admin Panel</a>

  <div class="glass-container admin-glass">
    <div style="text-align:center; margin-bottom: 40px;">
      <h1 style="font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 8px; color: #ff5252; font-weight: 900;">🏫
        Add School</h1>
      <p style="opacity: 0.7; font-weight: 500; font-size: 1.1rem; color: var(--text-muted);">Expand the EcoQuest
        network.</p>
    </div>

    <div class="input-group">
      <label class="input-label">Official Institution Name</label>
      <input id="school_name" class="input-field" placeholder="E.g. Greenwood International Academy">
    </div>

    <div class="input-group" style="margin-top: 20px;">
      <label class="input-label">Campus Address</label>
      <input id="address" class="input-field" placeholder="123 Nature Way, Forest City">
    </div>

    <div class="code-group" style="margin-top: 20px;">
      <div style="flex: 1;">
        <label class="input-label">District Integration Code</label>
        <input id="school_code" class="input-field" placeholder="SC-XXXX" readonly
          style="background: rgba(0,0,0,0.2); cursor: not-allowed;">
      </div>
      <button class="btn-premium"
        style="width: auto; padding: 16px 25px; font-size: 0.95rem; background: #fff; color: #000; margin-top: 0;"
        onclick="generateCode()">Generate Key</button>
    </div>

    <div class="divider"></div>

    <div style="margin-bottom: 25px;">
      <h3 style="margin: 0; font-weight: 900; color: #ff5252; font-size: 1.4rem;">Administrative Portal Access</h3>
      <p style="font-size: 0.95rem; opacity: 0.7; margin: 8px 0 20px; color: var(--text-muted);">Define the root
        authority account for this school.</p>
    </div>

    <div class="input-group">
      <label class="input-label">Admin Email Address</label>
      <input id="admin_email" type="email" class="input-field" placeholder="dean@institution.edu">
    </div>

    <div class="input-group" style="margin-top: 20px;">
      <label class="input-label">Secure Passkey</label>
      <input id="admin_password" type="password" class="input-field" placeholder="••••••••">
    </div>

    <button class="btn-premium" style="background: #ff5252; color: #fff; margin-top: 40px; font-size: 1.1rem;"
      onclick="addSchool()">Activate School System</button>
    <p id="msg" style="text-align:center; margin-top: 20px; font-weight: 800; min-height: 25px; font-size: 1.05rem;">
    </p>
  </div>

  <script>
    async function addSchool() {
      const school_name = document.getElementById("school_name").value.trim();
      const address = document.getElementById("address").value.trim();
      const school_code = document.getElementById("school_code").value.trim();
      const admin_email = document.getElementById("admin_email").value.trim();
      const admin_password = document.getElementById("admin_password").value.trim();
      const msg = document.getElementById("msg");

      if (!school_name || !address || !school_code || !admin_email || !admin_password) {
        msg.style.color = "#ff5252";
        msg.innerText = "Deployment failed: All fields required";
        return;
      }

      msg.style.color = "#fff";
      msg.innerText = "Initiating system deployment...";

      try {
        const res = await fetch("/api/addSchool", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            school_name, address, school_code, admin_email, admin_password
          })
        });

        const data = await res.json();

        if (res.ok) {
          msg.style.color = "#affc41";
          msg.innerHTML = `🎉 School Registered!<br>Administrative Access Initialized.<br><br>
            <div style="background:rgba(0,0,0,0.4); padding: 15px 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
              <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 5px;">Student Integration Code</div>
              <span style="font-size: 1.5rem; letter-spacing: 4px; color: #affc41; font-weight: 900;">${school_code}</span>
            </div>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 20px; line-height: 1.5;">
              Share this code with <strong>Students</strong> and <strong>Teachers</strong>.<br>
              <span style="color: #affc41;">Admin can login with just Email & Password.</span>
            </p>
            Redirecting to Admin Panel...`;
          setTimeout(() => window.location.href = "admin.html", 6000);
        } else {
          msg.style.color = "#ff5252";
          msg.innerText = data.error || "Registration Failed";
        }
      } catch (err) {
        msg.style.color = "#ff5252";
        msg.innerText = "Network failure - terminal connection lost";
      }
    }

    function generateCode() {
      const code = "SC" + Math.random().toString(36).substring(2, 6).toUpperCase();
      document.getElementById("school_code").value = code;
    }

    // Populate Forest Background
    const forest = document.getElementById('forest');
    const treeCount = Math.floor(window.innerWidth / 80);
    for (let i = 0; i < treeCount; i++) {
      const tree = document.createElement('div');
      tree.style.position = 'absolute';
      tree.style.bottom = '0';
      tree.style.left = (Math.random() * 100) + '%';
      tree.style.opacity = '0.05';
      tree.style.transform = `scale(${0.5 + Math.random()})`;
      tree.innerHTML = `<svg width="80" height="120"><path d="M40 10 L10 100 L70 100 Z" fill="#fff" /></svg>`;
      forest.appendChild(tree);
    }
  </script>
</body>

</html>
