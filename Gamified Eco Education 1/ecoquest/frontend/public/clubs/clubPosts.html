<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
  <meta charset="UTF-8">
  <title>Club Feed | EcoQuest</title>
  <link rel="stylesheet" href="../style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    .post-creation-box {
      background: var(--glass);
      backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .posts-feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }

    .post-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 25px;
      transition: var(--transition);
      animation: fadeInDown 0.6s ease-out;
    }

    .post-card:hover {
      transform: translateY(-8px);
      background: var(--glass-hover);
    }

    .post-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 20px;
      margin: 15px 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .post-author {
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .post-caption {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #fff;
    }

    .back-nav {
      position: absolute;
      top: 40px;
      left: 40px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.6;
      transition: 0.3s;
      z-index: 100;
    }

    .back-nav:hover {
      opacity: 1;
      transform: translateX(-5px);
    }

    @media (max-width: 768px) {
      .back-nav {
        top: 20px;
        left: 20px;
        font-size: 0.9rem;
      }

      .posts-feed {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="vines"></div>
  <div class="forest-bg" id="forest"></div>

  <a href="clubHome.html" class="back-nav">← Club Sanctuary</a>

  <div class="dashboard-wrapper">
    <div style="text-align:center; margin-bottom: 50px;">
      <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -1.5px; color: #fff;">📸 Ranger
        Feed</h1>
      <p style="opacity: 0.7; font-weight: 500; color: var(--text-muted);">Share your environmental impact with the
        tribe.</p>
    </div>

    <!-- Create Post Section -->
    <div class="post-creation-box">
      <h3 style="margin-top:0; font-weight: 800; font-size: 1.5rem; margin-bottom: 25px;">New Transmission</h3>

      <div class="input-group">
        <label class="input-label">Visual Link (URL)</label>
        <input id="image_url" class="input-field" placeholder="Paste image address (https://...)">
      </div>

      <div class="input-group" style="margin-top:20px;">
        <label class="input-label">Mission Report</label>
        <textarea id="caption" class="input-field" rows="3" style="resize:none; height: 100px;"
          placeholder="What's the story behind this impact?"></textarea>
      </div>

      <button class="btn-premium" style="margin-top: 30px;" onclick="addPost()">Broadcast Update</button>
      <p id="msg" style="text-align:center; margin-top:20px; font-weight:800; min-height: 25px;"></p>
    </div>

    <!-- Posts Feed -->
    <div class="posts-feed" id="postsContainer">
      <p style="text-align:center; grid-column: 1/-1;">Syncing with club satellites...</p>
    </div>
  </div>

  <script>
    const clubId = localStorage.getItem("club_id");
    const userId = localStorage.getItem("userId");
    const email = localStorage.getItem("userEmail");

    if (!clubId) { window.location.href = "clubHome.html"; }

    async function addPost() {
      const image_url = document.getElementById("image_url").value.trim();
      const caption = document.getElementById("caption").value.trim();
      const msg = document.getElementById("msg");

      if (!caption) {
        msg.style.color = "#ff5252";
        msg.innerText = "Caption is essential for the report!";
        return;
      }

      try {
        const res = await fetch("http://localhost:4000/api/clubs/addPost", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ club_id: clubId, email: email, image_url, caption })
        });
        const j = await res.json();
        if (j.success) {
          msg.style.color = "#affc41";
          msg.innerText = "🎉 Transmission Broadcasted!";
          document.getElementById("image_url").value = "";
          document.getElementById("caption").value = "";
          loadPosts();
        } else {
          msg.style.color = "#ff5252";
          msg.innerText = j.error || "Uplink failed.";
        }
      } catch (err) { console.error(err); }
    }

    async function loadPosts() {
      const container = document.getElementById("postsContainer");
      try {
        const res = await fetch(`http://localhost:4000/api/clubs/posts?club_id=${clubId}`);
        const j = await res.json();

        if (!j.success || j.posts.length === 0) {
          container.innerHTML = "<p style='text-align:center; opacity:0.6; padding: 50px; font-size: 1.2rem;'>No transmissions found. Start the movement!</p>";
          return;
        }

        container.innerHTML = j.posts.map(p => `
            <div class="post-card">
              <div class="post-author">${p.profiles?.full_name || "Eco Ranger"}</div>
              ${p.image_url ? (p.image_url.includes('drive.google.com') ? `<a href="${p.image_url}" target="_blank" style="display:block; margin: 10px 0; color: var(--accent); font-weight:bold;">📂 View Mission Attachment</a>` : `<img src="${p.image_url}" class="post-image" onerror="this.src='https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=1000'">`) : ""}
              <div class="post-caption">${p.caption}</div>
            </div>
        `).join("");
      } catch (err) { console.error(err); }
    }

    // Populate Forest Background
    const forest = document.getElementById('forest');
    const treeCount = Math.floor(window.innerWidth / 80);
    for (let i = 0; i < treeCount; i++) {
      const tree = document.createElement('div');
      tree.style.position = 'absolute';
      tree.style.bottom = '0';
      tree.style.left = (Math.random() * 100) + '%';
      tree.style.opacity = '0.05';
      tree.style.transform = `scale(${0.5 + Math.random()})`;
      tree.innerHTML = `<svg width="80" height="120"><path d="M40 10 L10 100 L70 100 Z" fill="#fff" /></svg>`;
      forest.appendChild(tree);
    }

    loadPosts();
  </script>
</body>

</html>
