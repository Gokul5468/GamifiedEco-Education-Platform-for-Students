<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
    <meta charset="utf-8">
    <title>Solar Architect | EcoQuest</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --solar-blue: #0ea5e9;
            --sun-yellow: #fbbf24;
            --city-gray: #334155;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hud {
            position: fixed;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            pointer-events: none;
        }

        .hud-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 15px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 5, 20, 0.9);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            max-width: 500px;
        }

        .prime-btn {
            background: var(--sun-yellow);
            color: #000;
            padding: 20px 60px;
            border-radius: 100px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="hud">
        <div class="hud-card">
            <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--sun-yellow);">GRID
                EFFICIENCY</div>
            <div id="efficiency-meter"
                style="width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 50px; margin-top: 10px; overflow: hidden;">
                <div id="efficiency-fill"
                    style="height: 100%; width: 0%; background: var(--sun-yellow); transition: 0.3s;"></div>
            </div>
        </div>
        <div class="hud-card">
            <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--solar-blue);">SOLAR
                ASSETS</div>
            <div id="score" style="font-size: 2.2rem; font-weight: 900;">00</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="overlay">
        <div class="modal">
            <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px;">SOLAR ARCHITECT
            </h1>
            <p style="opacity: 0.7; font-size: 1.1rem; line-height: 1.6;">Design the city's renewable future! Tap on the
                buildings to install solar panels and power the grid. Achieve 100% efficiency to win.</p>
            <button class="prime-btn" onclick="initGame()">START DESIGNING</button>
            <button class="prime-btn"
                style="background:transparent; color:#fff; border:1px solid #333; font-size:1rem; margin-top:10px"
                onclick="location.href='../games.html'">BACK</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const efficiencyFill = document.getElementById('efficiency-fill');
        let w, h, active = false, score = 0, efficiency = 0, buildings = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; setupBuildings(); }
        function setupBuildings() {
            buildings = [];
            const cols = 5; const rows = 3;
            const xSpace = w / (cols + 1);
            const ySpace = (h - 200) / (rows + 1);
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    buildings.push({ x: c * xSpace - 50, y: r * ySpace + 50, w: 100, h: 100 + Math.random() * 100, hasSolar: false });
                }
            }
        }
        window.addEventListener('resize', resize); resize();
        function initGame() { active = true; score = 0; efficiency = 0; overlay.style.display = 'none'; requestAnimationFrame(gameLoop); }
        
        async function savePoints() {
            const email = localStorage.getItem("userEmail");
            if (email && score > 0) {
                try {
                    await fetch("/api/users/addPoints", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            email: email, 
                            points_to_add: score * 50, 
                            game_name: "Solar Architect" 
                        })
                    });
                } catch(e) { console.log(e); }
            }
        }

        async function gameLoop() {
            if (!active) return;
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, w, h);
            buildings.forEach(b => {
                ctx.fillStyle = b.hasSolar ? '#334155' : '#1e293b';
                ctx.fillRect(b.x, h - b.h, b.w, b.h);
                if (b.hasSolar) {
                    ctx.fillStyle = '#fbbf24';
                    ctx.fillRect(b.x + 10, h - b.h + 10, 80, 20);
                }
            });
            efficiencyFill.style.width = efficiency + '%';
            if (efficiency >= 100) { 
                active = false;
                await savePoints();
                overlay.style.display = 'flex'; 
                document.querySelector('.modal h1').innerText = "CITY POWERED!"; 
                document.querySelector('.modal p').innerHTML = `You have successfully modernized the city's power grid.<br><br>Solar Assets Deployed: <span style="font-size:2.5rem; color:var(--sun-yellow); font-weight:900;">${score}</span>`;
                return; 
            }
            requestAnimationFrame(gameLoop);
        }
        canvas.addEventListener('mousedown', (e) => {
            if (!active) return;
            buildings.forEach(b => {
                if (e.clientX >= b.x && e.clientX <= b.x + b.w && e.clientY >= h - b.h) {
                    if (!b.hasSolar) { b.hasSolar = true; score++; scoreEl.innerText = score; efficiency += (100 / buildings.length); }
                }
            });
        });
    </script>
</body>

</html>
