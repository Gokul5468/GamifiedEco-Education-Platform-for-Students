<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
  <meta charset="utf-8">
  <title>Ecosystem Simulator Advanced | EcoQuest</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --eco-green: #22c55e;
      --oak: #166534;
      --pine: #064e3b;
      --sapling: #86efac;
      --sky: #7dd3fc;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: #020617;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* 📊 HUD */
    .hud {
      position: fixed;
      top: 30px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 100;
      pointer-events: none;
    }

    .hud-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      padding: 15px 30px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .co2-meter {
      width: 250px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      margin-top: 10px;
      overflow: hidden;
    }

    #co2-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #4ade80, #facc15, #f43f5e);
      transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 🛠 TOOLBAR */
    .toolbar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      padding: 12px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .tool-btn {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-5px);
    }

    .tool-btn.active {
      background: var(--eco-green);
      color: #000;
      box-shadow: 0 0 20px var(--eco-green);
    }

    /* 🎬 MENU */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 5, 20, 0.9);
      backdrop-filter: blur(30px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 60px;
      border-radius: 50px;
      text-align: center;
      max-width: 500px;
    }

    .prime-btn {
      background: var(--eco-green);
      color: #000;
      padding: 22px 60px;
      border-radius: 100px;
      font-size: 1.5rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      width: 100%;
      margin-top: 30px;
      box-shadow: 0 10px 40px rgba(34, 197, 94, 0.3);
    }
  </style>
</head>

<body>
  <div class="hud">
    <div class="hud-card">
      <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: #f43f5e;">GLOBAL CO2</div>
      <div class="co2-meter">
        <div id="co2-fill"></div>
      </div>
      <div id="ppm" style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">415 PPM</div>
    </div>
    <div class="hud-card">
      <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--eco-green);">ECO CREDITS</div>
      <div id="credits" style="font-size: 2.2rem; font-weight: 900;">100</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="toolbar">
    <button class="tool-btn active" onclick="setTool('oak', this)">🌳</button>
    <button class="tool-btn" onclick="setTool('pine', this)">🌲</button>
    <button class="tool-btn" onclick="setTool('water', this)">💧</button>
    <button class="tool-btn" style="margin-left:20px; font-size:1rem; width:auto; padding:0 20px;"
      onclick="savePoints().then(() => location.href='../games.html')">EXIT</button>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h1 style="font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; margin-bottom: 15px;">ECO TYCOON</h1>
      <p style="opacity: 0.7; font-size: 1.2rem; line-height: 1.6;">The planet's CO2 levels are rising. Deploy diversas
        species and manage the ecosystem to restore atmospheric balance.</p>
      <button class="prime-btn" onclick="initGame()">COMMENCE SIMULATION</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const creditsEl = document.getElementById('credits');
    const ppmEl = document.getElementById('ppm');
    const co2Fill = document.getElementById('co2-fill');

    let w, h;
    let active = false;
    let credits = 100;
    let co2 = 415;
    let time = 0;
    let trees = [];
    let particles = [];
    let tool = 'oak';

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Tree {
      constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type;
        this.growth = 0;
        this.thirst = 0;
        this.isDone = false;
        this.color = type === 'oak' ? '#166534' : '#064e3b';
        this.absorption = type === 'oak' ? 0.05 : 0.08;
      }
      update() {
        if (this.growth < 100) this.growth += 0.05;
        if (co2 > 300) co2 -= this.absorption * (this.growth / 100);
        this.thirst += 0.01;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        const scale = (this.growth / 100) * 1.5;
        ctx.scale(scale, scale);

        // Drawing Isometric Tree
        ctx.fillStyle = '#451a03'; // Trunk
        ctx.fillRect(-5, -20, 10, 20);

        ctx.fillStyle = this.color;
        if (this.type === 'oak') {
          ctx.beginPath(); ctx.arc(0, -35, 25, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(-15, -25, 20, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(15, -25, 20, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(30, -10); ctx.lineTo(-30, -10); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(0, -85); ctx.lineTo(20, -40); ctx.lineTo(-20, -40); ctx.closePath(); ctx.fill();
        }

        if (this.thirst > 50) {
          ctx.fillStyle = '#facc15'; ctx.font = '20px Arial'; ctx.fillText('💧', -10, -80);
        }

        ctx.restore();
      }
    }

    function setTool(t, btn) {
      tool = t;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function initGame() {
      active = true;
      credits = 200;
      co2 = 415;
      trees = [];
      overlay.style.display = 'none';
      requestAnimationFrame(gameLoop);
    }

    async function savePoints() {
      const email = localStorage.getItem("userEmail");
      const finalScore = Math.floor(trees.length * 100 + (415 - co2) * 10);
      if (email && finalScore > 0) {
        console.log("Saving score:", finalScore);
        try {
          const res = await fetch("/api/users/addPoints", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              email: email, 
              points_to_add: finalScore, 
              game_name: "Eco Tycoon" 
            })
          });
          const data = await res.json();
          console.log("Score saved successfully:", data);
        } catch (e) {
          console.error("Failed to save score:", e);
        }
      }
    }

    function gameLoop() {
      if (!active) return;
      time++;

      // CO2 Natural Increase
      co2 += 0.02;
      ppmEl.innerText = Math.round(co2) + ' PPM';
      co2Fill.style.width = Math.min(100, Math.max(0, ((co2 - 300) / 2))) + '%';

      if (co2 > 500) {
        active = false; ppmEl.style.color = '#f43f5e';
        savePoints();
        alert("ATMOSPHERIC COLLAPSE! CO2 EXCEEDED 500PPM.");
        location.href = '../games.html';
      }

      // Credits generation
      if (time % 60 === 0) {
        credits += Math.floor(trees.length * 2);
        creditsEl.innerText = credits;
      }

      // BG
      const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w);
      grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#020617');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Ground Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let i = 0; i < w; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
      for (let i = 0; i < h; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }

      // Trees Logic
      trees.forEach(t => { t.update(); t.draw(); });

      requestAnimationFrame(gameLoop);
    }

    canvas.onclick = (e) => {
      if (!active) return;
      if (tool === 'water') {
        trees.forEach(t => {
          const d = Math.sqrt(Math.pow(t.x - e.clientX, 2) + Math.pow(t.y - e.clientY, 2));
          if (d < 50) t.thirst = 0;
        });
        return;
      }

      const cost = tool === 'oak' ? 50 : 80;
      if (credits >= cost) {
        credits -= cost;
        creditsEl.innerText = credits;
        trees.push(new Tree(e.clientX, e.clientY, tool));
      }
    }
  </script>
</body>

</html>
