<!DOCTYPE html>
<html lang="en">

<head>
<script>
  // Auto API base: works both via file:// and http://localhost:4000
  (function(){
    var base = window.location.protocol === 'file:' ? 'http://localhost:4000' : '';
    if (!base) return;
    var _f = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.startsWith('/')) url = base + url;
      return _f(url, opts);
    };
  })();
</script>
    <meta charset="utf-8">
    <title>Wildlife Protector | EcoQuest</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --animal-gold: #f59e0b;
            --forest-deep: #064e3b;
            --danger-red: #f43f5e;
            --safe-blue: #0ea5e9;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hud {
            position: fixed;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            pointer-events: none;
        }

        .hud-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 15px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 5, 20, 0.9);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            max-width: 500px;
        }

        .prime-btn {
            background: var(--animal-gold);
            color: #000;
            padding: 20px 60px;
            border-radius: 100px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="hud">
        <div class="hud-card">
            <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--danger-red);">HABITAT
                LOSS</div>
            <div id="habitat-meter"
                style="width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 50px; margin-top: 10px; overflow: hidden;">
                <div id="habitat-fill"
                    style="height: 100%; width: 0%; background: var(--danger-red); transition: 0.3s;"></div>
            </div>
        </div>
        <div class="hud-card">
            <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--animal-gold);">ANIMALS
                RESCUED</div>
            <div id="score" style="font-size: 2.2rem; font-weight: 900;">00</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="overlay">
        <div class="modal">
            <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px;">WILDLIFE PROTECTOR
            </h1>
            <p style="opacity: 0.7; font-size: 1.1rem; line-height: 1.6;">Wildfire is spreading! Rescue animals by
                tapping them and redirecting them to the safe blue zone before the forest is lost.</p>
            <button class="prime-btn" onclick="initGame()">START RESCUE</button>
            <button class="prime-btn"
                style="background:transparent; color:#fff; border:1px solid #333; font-size:1rem; margin-top:10px"
                onclick="location.href='../games.html'">BACK</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const habitatFill = document.getElementById('habitat-fill');
        let w, h, active = false, score = 0, habitatLoss = 0, time = 0, animals = [], Fires = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Animal {
            constructor() {
                this.x = Math.random() * (w - 100) + 50;
                this.y = Math.random() * (h - 200) + 50;
                this.size = 30; this.type = ['🦊', '🐰', '🦌', '🐨', '🐼'][Math.floor(Math.random() * 5)];
                this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
                this.isRescued = false;
                this.isDone = false;
            }
            update() {
                if (!this.isRescued) { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > w) this.vx *= -1; if (this.y < 0 || this.y > h - 150) this.vy *= -1; }
                else { this.y += 5; if (this.y > h) this.isDone = true; }
            }
            draw() {
                ctx.font = this.size + 'px Arial';
                ctx.fillText(this.type, this.x, this.y);
            }
        }
        function initGame() { active = true; score = 0; habitatLoss = 0; animals = []; Fires = []; overlay.style.display = 'none'; requestAnimationFrame(gameLoop); }
        
        async function savePoints() {
            const email = localStorage.getItem("userEmail");
            if (email && typeof score !== 'undefined' && score > 0) {
                try {
                    await fetch("/api/users/addPoints", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            email: email, 
                            points_to_add: score * 10, // Scale score
                            game_name: "Wildlife Warden" 
                        })
                    });
                } catch(e) { console.log(e); }
            }
        }

        async function gameLoop() {
            if (!active) return; time++;
            habitatLoss += 0.05; habitatFill.style.width = habitatLoss + '%';
            if (habitatLoss >= 100) { 
                active = false;
                await savePoints();
                overlay.style.display = 'flex'; 
                document.querySelector('.modal h1').innerText = "FOREST LOST"; 
                document.querySelector('.modal p').innerHTML = `The habitat loss has peaked. Final Rescue Count: <span style="font-size:2.5rem; color:var(--animal-gold); font-weight:900;">${score}</span>`;
                return; 
            }
            ctx.fillStyle = '#064e3b'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(14, 165, 233, 0.2)'; ctx.fillRect(0, h - 150, w, 150);
            if (time % 60 === 0) animals.push(new Animal());
            animals = animals.filter(a => {
                a.update(); a.draw();
                if (!a.isRescued && a.y > h - 150) { a.isRescued = true; score++; scoreEl.innerText = score; habitatLoss = Math.max(0, habitatLoss - 5); }
                return !a.isDone;
            });
            requestAnimationFrame(gameLoop);
        }
        canvas.addEventListener('mousedown', (e) => {
            animals.forEach(a => {
                if (Math.abs(a.x - e.clientX) < 50 && Math.abs(a.y - e.clientY) < 50) { a.vy = 8; a.vx = 0; }
            });
        });
    </script>
</body>

</html>
