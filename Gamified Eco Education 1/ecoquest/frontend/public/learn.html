<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Nature Library | EcoQuest</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #affc41;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('library.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    .back-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .back-nav:hover {
      background: var(--accent);
      color: #000;
    }

    .dashboard-wrapper {
      max-width: 1300px;
      width: 92%;
      margin: 60px auto;
      position: relative;
      z-index: 10;
    }

    .hero-banner {
      padding: 60px 20px;
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-banner h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    .hero-banner h1 span { color: var(--accent); }

    .wisdom-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .wisdom-card {
      background: var(--glass);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      transition: 0.3s ease;
      cursor: pointer;
    }

    .wisdom-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
    }

    .wisdom-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      opacity: 0.8;
    }

    .wisdom-content { padding: 20px; }

    .wisdom-tag {
      color: var(--accent);
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .wisdom-card h3 { margin: 10px 0; font-size: 1.4rem; }

    #readerView {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(20px);
      z-index: 2000;
      padding: 60px 20px;
      overflow-y: auto;
    }

    .reader-content { max-width: 700px; margin: 0 auto; line-height: 1.8; }

    .close-btn {
      position: fixed;
      top: 30px;
      right: 30px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-read-more {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 35px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-weight: 900;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(175, 252, 65, 0.2);
    }

    .btn-read-more:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(175, 252, 65, 0.4);
    }

    .navbar-mobile {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: space-around;
      padding: 20px 0;
      backdrop-filter: blur(10px);
      z-index: 100;
    }
  </style>
</head>

<body>
  <a href="student.html" class="back-nav">← Dashboard</a>

  <div class="dashboard-wrapper">
    <div class="hero-banner">
      <h1>NATURE <span>LIBRARY</span></h1>
      <p>Cinematically curated environmental wisdom for the next generation.</p>
    </div>
    <div class="wisdom-grid" id="libraryGrid"></div>
  </div>

  <div id="readerView">
    <div class="close-btn" onclick="closeReader()">✕</div>
    <div class="reader-content">
      <h1 id="readTitle" style="font-size: 3rem; color: var(--accent); margin-bottom: 10px;">Title</h1>
      <p id="readMeta" style="opacity: 0.6; font-weight: 700; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px;"></p>
      <div id="readBody">Content...</div>
      <a id="readLink" href="#" target="_blank" class="btn-read-more">View Full Source</a>
    </div>
  </div>

  <nav class="navbar-mobile">
    <div onclick="location.href='student.html'">🏠</div>
    <div onclick="location.href='learn.html'" style="color: var(--accent)">📚</div>
    <div onclick="location.href='profile.html'">👤</div>
  </nav>

  <script>
    const libraryData = [

      { id: 'forest_feat', category: 'Terrestrial', title: 'The Wood Wide Web', summary: 'Underground fungal networks connecting the forest.', img: 'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&q=80&w=800', body: 'Trees communicate using mycelium networks...', author: 'Suzanne Simard', link: 'https://en.wikipedia.org/wiki/Mycorrhizal_network' },
      { id: 'energy_feat', category: 'Renewable', title: 'Sun-Powered Future', summary: 'Transitioning to infinite energy from the stars.', img: 'https://images.unsplash.com/photo-1466611653911-954ff6541a4e?auto=format&fit=crop&q=80&w=800', body: 'Solar energy is the key to a sustainable future...', author: 'Mark Z. Jacobson', link: 'https://en.wikipedia.org/wiki/Solar_energy' },

      /* --- OCEANOGRAPHY BOOKS --- */
      { id: 'ocean1', category: 'Oceanography', title: "Earth's Incredible Oceans", summary: "By Jess French. Exploring the secret world of the sea.", img: 'https://images.unsplash.com/photo-1439066615861-d1af74d74000?auto=format&fit=crop&q=80&w=800', body: 'A deep dive into jellyfish, sharks, and deep-sea dwellers.', author: 'Jess French', link: 'https://www.google.com/search?q=Earth%27s+Incredible+Oceans+Jess+French' },
      { id: 'ocean2', category: 'Oceanography', title: "Big Book Of The Ocean", summary: "National Geographic. Photo-rich reference for kids.", img: 'https://images.unsplash.com/photo-1551244072-5d12893278ab?auto=format&fit=crop&q=80&w=800', body: 'Learn about dolphins, penguins, and the blue whale.', author: 'National Geographic', link: 'https://www.google.com/search?q=National+Geographic+Big+Book+Of+The+Ocean' },
      { id: 'ocean3', category: 'Oceanography', title: "Very Important Oceans", summary: "A vibrant encyclopedia for young explorers.", img: 'https://images.unsplash.com/photo-1518467166778-b88f373ffec7?auto=format&fit=crop&q=80&w=800', body: 'Answers big questions about the waves and tides.', author: 'DK Publishing', link: 'https://www.google.com/search?q=Very+Important+Oceans+DK' },

      { id: 'terr1', category: 'Terrestrial', title: "Workings Of Planet Earth", summary: "Illustrated tour of global ecosystems.", img: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800', body: 'How diverse habitats function across the globe.', author: 'Rachel Ignotofsky', link: 'https://www.google.com/search?q=The+Wondrous+Workings+of+Planet+Earth' },
      { id: 'terr2', category: 'Terrestrial', title: "Soul Forest", summary: "Children hearing the Earth’s secrets.", img: 'https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&q=80&w=800', body: 'A magical dialogue about conservation and science.', author: 'Jean-Baptiste de Panafieu', link: 'https://www.google.com/search?q=Soul+of+the+Forest+book' },

      { id: 'terr4', category: 'Terrestrial', title: "The Mother Tree", summary: "Support networks in the deep woods.", img: 'https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=800', body: 'How oldest trees protect the youngest saplings.', author: 'Suzanne Simard', link: 'https://www.google.com/search?q=Finding+the+Mother+Tree' },
      { id: 'terr5', category: 'Terrestrial', title: "Wonder Walkers", summary: "Exploring nature’s everyday mysteries.", img: 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=800', body: 'Encouraging kids to look closer at the world.', author: 'Micha Archer', link: 'https://www.google.com/search?q=Wonder+Walkers+Micha+Archer' },
      { id: 'terr6', category: 'Terrestrial', title: "We Are Water Protectors", summary: "Indigenous-led environmental justice.", img: 'https://images.unsplash.com/photo-1437482273940-10deec9a8631?auto=format&fit=crop&q=80&w=800', body: 'A powerful story about protecting our resources.', author: 'Carole Lindstrom', link: 'https://www.google.com/search?q=We+Are+Water+Protectors' },
      { id: 'terr7', category: 'Terrestrial', title: "City Green", summary: "Transforming vacant lots into gardens.", img: 'https://images.unsplash.com/photo-1466692479417-3f5dfaa02d23?auto=format&fit=crop&q=80&w=800', body: 'How community action can bloom in the city.', author: 'DyAnne DiSalvo-Ryan', link: 'https://www.google.com/search?q=City+Green+DyAnne+DiSalvo-Ryan' },
      { id: 'terr8', category: 'Terrestrial', title: "Greta and the Giants", summary: "An allegory of climate activism.", img: 'https://images.unsplash.com/photo-1552083375-1447ce886485?auto=format&fit=crop&q=80&w=800', body: 'Inspired by Greta Thunberg’s journey.', author: 'Zoë Tucker', link: 'https://www.google.com/search?q=Greta+and+the+Giants' },
      { id: 'terr9', category: 'Terrestrial', title: "Compost Stew", summary: "The science of soil and recycling.", img: 'https://images.unsplash.com/photo-1592150621344-c7923175082f?auto=format&fit=crop&q=80&w=800', body: 'An A-to-Z rhyming recipe for healthy Earth.', author: 'Mary McKenna Siddals', link: 'https://www.google.com/search?q=Compost+Stew+Mary+McKenna+Siddals' },
      { id: 'terr10', category: 'Terrestrial', title: "Our Planet Earth Box Set", summary: "6 books on Earth's diverse features.", img: 'https://images.unsplash.com/photo-1502637098811-ad9526f2b65c?auto=format&fit=crop&q=80&w=800', body: 'Comprehensive reference for young geologists.', author: 'Scholastic', link: 'https://www.google.com/search?q=Our+Planet+Earth+Box+Set' },

      /* --- RENEWABLE ENERGY BOOKS --- */
      { id: 'nrgy1', category: 'Renewable', title: "Planet Power", summary: "Explore the world’s renewable energy.", img: 'https://images.unsplash.com/photo-1509391366360-fe5bb6293a61?auto=format&fit=crop&q=80&w=800', body: 'Verse-based introduction to wind and water power.', author: 'Stacy P. Clark', link: 'https://www.google.com/search?q=Planet+Power+Stacy+P.+Clark' },
      { id: 'nrgy2', category: 'Renewable', title: "DKfindout! Energy", summary: "Fact-packed guide to power sources.", img: 'https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&q=80&w=800', body: 'Comparing fossil fuels to sustainable solutions.', author: 'DK Publishing', link: 'https://www.google.com/search?q=DKfindout!+Energy' },
      { id: 'nrgy3', category: 'Renewable', title: "Go Green: Energy", summary: "Awareness about saving the planet.", img: 'https://images.unsplash.com/photo-1454165833267-028cc2402f9a?auto=format&fit=crop&q=80&w=800', body: 'Narrative stories about harnessing nature.', author: 'Scholastic', link: 'https://www.google.com/search?q=Go+Green+Energy+Scholastic' },

      { id: 'nrgy6', category: 'Renewable', title: "Green Planet: Solar", summary: "Focusing on capturing the sun.", img: 'https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?auto=format&fit=crop&q=80&w=800', body: 'How panels turn light into electricity.', author: 'World Book', link: 'https://www.google.com/search?q=Solar+Power+Green+Planet' },
      { id: 'nrgy7', category: 'Renewable', title: "Geothermal Energy", summary: "Tapping into Earth’s internal heat.", img: 'https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=800', body: 'Powering cities using volcanic heat.', author: 'Martha London', link: 'https://www.google.com/search?q=Geothermal+Energy+Martha+London' },
      { id: 'nrgy8', category: 'Renewable', title: "Energy Infographics", summary: "Bold visuals explaining energy waves.", img: 'https://images.unsplash.com/photo-1497435334941-8c899ee9e8e9?auto=format&fit=crop&q=80&w=800', body: 'Kinetic and potential energy made simple.', author: 'Renae Gilles', link: 'https://www.google.com/search?q=Energy+Infographics+Renae+Gilles' },
      { id: 'nrgy9', category: 'Renewable', title: "Benjamin Franklin", summary: "The discovery of electricity.", img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=800', body: 'The history of early electrical experiments.', author: 'National Geographic', link: 'https://www.google.com/search?q=Benjamin+Franklin+National+Geographic' },
      { id: 'nrgy10', category: 'Renewable', title: "A Life Electric", summary: "The story of Nikola Tesla.", img: 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&q=80&w=800', body: 'The scientist who envisioned the modern grid.', author: 'Azadeh Westergaard', link: 'https://www.google.com/search?q=A+Life+Electric+Nikola+Tesla' }
    ];

    function render() {
      const grid = document.getElementById('libraryGrid');
      libraryData.forEach(item => {
        grid.innerHTML += `
          <div class="wisdom-card" onclick="openReader('${item.id}')">
            <img src="${item.img}" alt="book">
            <div class="wisdom-content">
              <span class="wisdom-tag">${item.category}</span>
              <h3>${item.title}</h3>
              <p>${item.summary}</p>
            </div>
          </div>`;
      });
    }

    function openReader(id) {
      const item = libraryData.find(d => d.id === id);
      document.getElementById('readTitle').innerText = item.title;
      document.getElementById('readMeta').innerText = `Category: ${item.category} • Author: ${item.author}`;
      document.getElementById('readBody').innerHTML = item.body;
      document.getElementById('readLink').href = item.link;
      document.getElementById('readerView').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeReader() { 
      document.getElementById('readerView').style.display = 'none'; 
      document.body.style.overflow = 'auto';
    }

    render();
  </script>
</body>
</html>
